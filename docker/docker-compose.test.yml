version: '3.8'

services:
  test-db:
    image: postgres:15-alpine
    container_name: asktown-test-db
    environment:
      POSTGRES_USER: asktown_user
      POSTGRES_PASSWORD: asktown_password
      POSTGRES_DB: asktown_test
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - asktown-net

  test-app:
    build:
      context: ..
      dockerfile: docker/app.Dockerfile
    container_name: asktown-test-env
    volumes:
      - ..:/var/www/html
      - /opt/finance/.env:/opt/finance/.env:ro
      - /opt/finance/users:/opt/finance/users:ro
    environment:
      - DB_HOST=test-db
      - DB_NAME=asktown_test
      - DB_USER=asktown_user
      - DB_PASS=asktown_password
    ports:
      - "8080:80"
    depends_on:
      - test-db
    networks:
      - asktown-net

networks:
  asktown-net:
    driver: bridge
